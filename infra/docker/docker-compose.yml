services:
  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.dev
    container_name: codexpanel-web
    working_dir: /workspace
    command: >
      sh -lc "
      pnpm install --no-frozen-lockfile --reporter=append-only &&
      pnpm --filter @codexpanel/web dev
      "
    environment:
      NODE_ENV: development
      CI: "true"
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,postgres,redis}
      http_proxy: ${HTTP_PROXY:-}
      https_proxy: ${HTTPS_PROXY:-}
      no_proxy: ${NO_PROXY:-localhost,127.0.0.1,postgres,redis}
      WEB_PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000}
      API_BASE_URL: ${API_BASE_URL:-http://host.docker.internal:4000}
    ports:
      - '3000:3000'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - ../..:/workspace
      - pnpm_store:/pnpm
      - node_modules:/workspace/node_modules
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: codexpanel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: codexpanel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: codexpanel-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  node_modules:
  pnpm_store:
  postgres_data:
  redis_data:

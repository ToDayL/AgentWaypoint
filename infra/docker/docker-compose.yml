name: agentwaypoint

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: agentwaypoint-nginx
    restart: unless-stopped
    depends_on:
      web:
        condition: service_started
    environment:
      WEB_UPSTREAM: web:3000
      SERVER_NAME: ${NGINX_SERVER_NAME:-localhost}
      SSL_CERT_PATH: /etc/nginx/certs/${NGINX_SSL_CERT_FILE:-localhost.crt}
      SSL_KEY_PATH: /etc/nginx/certs/${NGINX_SSL_KEY_FILE:-localhost.key}
      SSL_TRUSTED_CERT_FILE: ${NGINX_SSL_TRUSTED_CERT_FILE:-}
    command: >
      /bin/sh -c "sh /opt/nginx/generate-config.sh && exec nginx -g 'daemon off;'"
    ports:
      - '${NGINX_HTTPS_PORT:-3000}:443'
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/default.conf.template:/opt/nginx/default.conf.template:ro
      - ./nginx/generate-config.sh:/opt/nginx/generate-config.sh:ro

  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.dev
    container_name: agentwaypoint-web
    working_dir: /workspace
    command: >
      sh -lc "
      pnpm install --no-frozen-lockfile --reporter=append-only &&
      pnpm --filter @agentwaypoint/web dev
      "
    environment:
      NODE_ENV: development
      CI: "true"
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1},api,postgres,redis,host.docker.internal
      http_proxy: ${HTTP_PROXY:-}
      https_proxy: ${HTTPS_PROXY:-}
      no_proxy: ${NO_PROXY:-localhost,127.0.0.1},api,postgres,redis,host.docker.internal
      WEB_PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://api:4000}
      API_BASE_URL: ${WEB_API_BASE_URL:-http://api:4000}
    expose:
      - '3000'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - ../..:/workspace
      - pnpm_store:/pnpm
      - web_node_modules:/workspace/node_modules
    depends_on:
      api:
        condition: service_started
      postgres:
        condition: service_started
      redis:
        condition: service_started

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.dev
    container_name: agentwaypoint-api
    working_dir: /workspace
    command: >
      sh -lc "
      pnpm install --no-frozen-lockfile --reporter=append-only &&
      pnpm --filter @agentwaypoint/api prisma:generate &&
      pnpm --filter @agentwaypoint/api dev
      "
    environment:
      NODE_ENV: development
      CI: "true"
      PORT: 4000
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1},api,postgres,redis,host.docker.internal
      http_proxy: ${HTTP_PROXY:-}
      https_proxy: ${HTTPS_PROXY:-}
      no_proxy: ${NO_PROXY:-localhost,127.0.0.1},api,postgres,redis,host.docker.internal
      DATABASE_URL: ${API_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/agentwaypoint}
      REDIS_URL: ${API_REDIS_URL:-redis://redis:6379}
      RUNNER_MODE: ${API_RUNNER_MODE:-http}
      RUNNER_BASE_URL: ${API_RUNNER_BASE_URL:-http://host.docker.internal:4700}
      RUNNER_HTTP_TIMEOUT_MS: ${RUNNER_HTTP_TIMEOUT_MS:-5000}
      RUNNER_AUTH_TOKEN: ${RUNNER_AUTH_TOKEN:-}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
    ports:
      - '127.0.0.1:${API_PORT:-4000}:4000'
    expose:
      - '4000'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - ../..:/workspace
      - pnpm_store:/pnpm
      - api_node_modules:/workspace/node_modules
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: agentwaypoint-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agentwaypoint
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: agentwaypoint-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  web_node_modules:
  api_node_modules:
  pnpm_store:
  postgres_data:
  redis_data:
